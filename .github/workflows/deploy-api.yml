name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-api.yml
      - apps/api/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml

jobs:
  deploy-api:
    name: Deploy API to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    concurrency:
      group: production-deploy-api
      cancel-in-progress: false
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      REDIS_TOKEN: ${{ secrets.REDIS_TOKEN }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
      TRUSTED_ORIGIN: ${{ secrets.TRUSTED_ORIGIN }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_API_KEY: ${{ secrets.GCP_API_KEY }}
      GCP_LOCATION: ${{ secrets.GCP_LOCATION }}
      LLM_MODEL_ID: ${{ secrets.LLM_MODEL_ID }}
      EXPO_PUSH_SEND_URL: ${{ secrets.EXPO_PUSH_SEND_URL }}
      EXPO_PUSH_RECEIPTS_URL: ${{ secrets.EXPO_PUSH_RECEIPTS_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm --filter api db:migrate

      - name: Deploy API
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy --minify
          secrets: |
            DATABASE_URL
            REDIS_URL
            REDIS_TOKEN
            BETTER_AUTH_SECRET
            BETTER_AUTH_URL
            TRUSTED_ORIGIN
            GCP_PROJECT_ID
            GCP_API_KEY
            GCP_LOCATION
            LLM_MODEL_ID
            EXPO_PUSH_SEND_URL
            EXPO_PUSH_RECEIPTS_URL
